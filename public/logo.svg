<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Gradient -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8a4baf;stop-opacity:1" /> <!-- Purple -->
      <stop offset="100%" style="stop-color:#ff69b4;stop-opacity:1" /> <!-- Pink -->
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" /> <!-- Sky Blue -->
      <stop offset="100%" style="stop-color:#8a4baf;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="6" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Glow -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon Frame -->
  <path d="M128 10 L230 70 L230 186 L128 246 L26 186 L26 70 Z" 
        fill="#E6D8C1" 
        stroke="url(#brandGradient)" 
        stroke-width="4" 
        filter="url(#premiumShadow)" />
  
  <!-- Outer Glow Ring -->
  <path d="M128 20 L220 75 L220 181 L128 236 L36 181 L36 75 Z" 
        fill="none" 
        stroke="url(#accentGradient)" 
        stroke-width="1" 
        stroke-opacity="0.3" />

  <!-- The "Perfect" Bolt -->
  <g filter="url(#softGlow)">
    <path d="M145 45 L90 125 L120 125 L110 210 L165 130 L135 130 L145 45 Z" 
          fill="url(#brandGradient)" 
          stroke="white" 
          stroke-width="1.5" />
  </g>

  <!-- Decorative Orbit Particles -->
  <circle cx="210" cy="80" r="5" fill="#ff69b4" opacity="0.8" />
  <circle cx="46" cy="176" r="4" fill="#87ceeb" opacity="0.8" />
  <circle cx="128" cy="225" r="3" fill="#8a4baf" opacity="0.6" />
</svg>
